<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            var stored = localStorage.getItem('oc-theme');
            var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', stored || (systemDark ? 'dark' : 'light'));
        })();
    </script>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Livemap — OpenCaching</title>
    <link rel="stylesheet" href="/_frontend/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="/_frontend/css/oc-style.css">
    <link rel="stylesheet" href="/_frontend/css/map.css">
    <style>
        body { overflow: hidden; height: 100vh; }
        main.content { padding: 0 !important; margin: 0 !important; overflow: hidden; min-height: 0; }
        #mapRoot { width: 100%; height: calc(100vh - 56px); margin: 0; padding: 0; border: none; }
        footer { display: none !important; }
    </style>
    <script>window.OCI18n = {};</script>
</head>
<body data-page="livemap" data-map-js="true">
    <div id="mapRoot"></div>
    <script>
        window.uniCacheWP = [];
        (function() {
            var p = new URLSearchParams(location.search);
            window.lat = p.has('lat') ? parseFloat(p.get('lat')) : 52.376;
            window.lon = p.has('lon') ? parseFloat(p.get('lon')) : 9.732;
            window.defaultZoom = p.has('zoom') ? parseInt(p.get('zoom')) : 13;
        })();
    </script>
    <script src="/_frontend/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script type="module" src="/_frontend/js/loader.js"></script>
</body>
</html>
