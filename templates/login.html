<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            var stored = localStorage.getItem('oc-theme');
            var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', stored || (systemDark ? 'dark' : 'light'));
        })();
    </script>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — OpenCaching</title>
    <link rel="stylesheet" href="/_frontend/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="/_frontend/css/oc-style.css">
</head>
<body>
    <div class="container" style="max-width:400px;margin-top:80px;">
        <h2 class="text-center mb-4">Login</h2>
        <div id="login-error" class="alert alert-danger" style="display:none"></div>
        <form method="post" action="/login">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required autofocus>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="text-center mt-3"><a href="/">Back to home</a></p>
    </div>
    <script>
        var p = new URLSearchParams(location.search);
        var err = p.get('error');
        var msgs = { invalid: 'Invalid username or password.', empty: 'Please enter username and password.', server: 'Server error. Please try again.' };
        if (err && msgs[err]) {
            var el = document.getElementById('login-error');
            el.textContent = msgs[err];
            el.style.display = 'block';
        }
    </script>
    <script src="/_frontend/vendor/bootstrap/bootstrap.bundle.min.js"></script>
</body>
</html>
