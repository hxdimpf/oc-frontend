'API for everyone — openly documented': 'API für alle — offen dokumentiert'
'Dark mode & mobile support': 'Dark Mode & Mobile-Support'
'OpenCaching is part of a worldwide network of independent geocaching platforms.': 'OpenCaching ist Teil eines weltweiten Netzwerks unabhängiger Geocaching-Plattformen.'
'Find a cache near you and navigate by GPS to the coordinates.': 'Suche einen Cache in deiner Nähe und navigiere mit GPS zu den Koordinaten.'
'Sign the physical logbook and record your find online.': 'Trage dich im physischen Logbuch ein und logge online deinen Fund.'
'Place your own cache and share your favourite spots with the community.': 'Lege selbst einen Cache an und teile deine Lieblingsorte mit der Community.'
'OpenCaching is open, free and entirely community-driven.': 'OpenCaching ist offen, kostenlos und vollständig in der Hand der Community.'
'OpenCaching uses no proprietary map APIs. The live map runs on OpenStreetMap — open, free, no API key required.': 'OpenCaching setzt keine proprietären Karten-APIs ein. Die Live-Karte läuft auf OpenStreetMap — offen, kostenlos, ohne API-Schlüssel.'
