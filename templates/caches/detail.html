<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            var stored = localStorage.getItem('oc-theme');
            var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', stored || (systemDark ? 'dark' : 'light'));
        })();
    </script>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cache — OpenCaching</title>
    <link rel="stylesheet" href="/_frontend/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="/_frontend/css/oc-style.css">
    <link rel="stylesheet" href="/_frontend/vendor/tabulator/tabulator.min.css">
    <link rel="stylesheet" href="/_frontend/css/tabulator_oc.css">
    <link rel="stylesheet" href="/_frontend/css/map.css">
    <script>window.OCI18n = {};</script>
</head>
<body data-page="cache" data-map-js="true">
    <div id="explore-container"></div>
    <div id="mapRoot" style="display:none"></div>
    <script>
        window.uniCacheWP = [];
        window.defaultZoom = 14;
        // Extract waypoint from URL: /cache/OC17A7F → OC17A7F
        var m = location.pathname.match(/\/cache\/([A-Za-z0-9]+)/);
        if (m) document.getElementById('explore-container').dataset.code = m[1];
    </script>
    <script src="/_frontend/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script type="module" src="/_frontend/js/loader.js"></script>
</body>
</html>
